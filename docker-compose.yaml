services:
  db:
    image: postgres:16-alpine
    container_name: django_db
    mem_limit: 2g
    cpus: "2.0"
    env_file:
      - ./docker/.env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incar_ma -d django_ma_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis_server
    mem_limit: 256m
    cpus: "0.5"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: django_web
    mem_limit: 1g
    cpus: "2.0"
    command: >
      gunicorn web_ma.asgi:application
      -k uvicorn.workers.UvicornWorker
      --workers 3
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --log-level info
      --access-logfile -
      --error-logfile -
      --capture-output
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/healthz', headers={'Host':'ma-support.kr','X-Forwarded-Proto':'https'}); body=urllib.request.urlopen(req, timeout=5).read(); raise SystemExit(0 if body.strip()==b'ok' else 1)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - media_data:/app/media
      - ../var:/app/var
    restart: unless-stopped

  celery:
    build:
      context: .
    container_name: django_celery
    mem_limit: 768m
    cpus: "1.5"
    command: celery -A web_ma worker --loglevel=info
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../var:/app/var
      - media_data:/app/media
    restart: unless-stopped

  celery-beat:
    build:
      context: .
    container_name: django_celery_beat
    mem_limit: 256m
    cpus: "0.5"
    command: celery -A web_ma beat --loglevel=info
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../var:/app/var
      - media_data:/app/media
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: django_nginx
    mem_limit: 128m
    cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/maintenance/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - ./ops/certs:/etc/nginx/certs:ro
      - media_data:/app/media
    restart: unless-stopped

volumes:
  pgdata:
  media_data:
