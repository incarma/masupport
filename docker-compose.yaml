services:
  db:
    image: postgres:16-alpine
    container_name: django_db
    env_file:
      - ./docker/.env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incar_ma -d django_ma_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    mem_limit: 2g
    cpus: "2.0"
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis_server
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    mem_limit: 256m
    cpus: "0.5"
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: django_web
    command: >
      gunicorn web_ma.asgi:application
      -k uvicorn.workers.UvicornWorker
      --workers 3
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --log-level info
      --access-logfile -
      --error-logfile -
      --capture-output
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/healthz', headers={'Host':'ma-support.kr','X-Forwarded-Proto':'https'}); body=urllib.request.urlopen(req, timeout=5).read(); raise SystemExit(0 if body.strip()==b'ok' else 1)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - media_data:/app/media
      - staticfiles:/app/staticfiles
      - ../var:/app/var
    mem_limit: 1g
    cpus: "2.0"
    restart: unless-stopped

  celery:
    build:
      context: .
    container_name: django_celery
    command: celery -A web_ma worker --loglevel=info
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../var:/app/var
      - media_data:/app/media
    mem_limit: 768m
    cpus: "1.5"
    restart: unless-stopped

  celery-beat:
    build:
      context: .
    container_name: django_celery_beat
    command: celery -A web_ma beat --loglevel=info
    env_file:
      - ./docker/.env.prod
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../var:/app/var
      - media_data:/app/media
    mem_limit: 256m
    cpus: "0.5"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    # OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET / WEBUI_SECRET_KEY 는
    # docker/.env.prod 에서 주입 (커밋 금지)
    env_file:
      - ./docker/.env.prod
    volumes:
      - open-webui:/app/backend/data
    environment:
      # WSL2에서 실행 중인 Ollama에 접근
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Open WebUI는 서브패스(/ai/)가 아닌 전용 서브도메인으로 분리
      - WEBUI_URL=https://ai.ma-support.kr
      - CORS_ALLOW_ORIGIN=https://ai.ma-support.kr
      # ── OIDC / OAuth2 연동 ──────────────────────────────────────────────
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_PROVIDER_NAME=MA Support
      - OPENID_PROVIDER_URL=https://ma-support.kr/o
      - OAUTH_SCOPES=openid profile email
      - OAUTH_USERNAME_CLAIM=name
      - OAUTH_EMAIL_CLAIM=email
      # 회원가입 차단 — OIDC 경로만 허용
      - ENABLE_SIGNUP=false
      # 아래 항목은 docker/.env.prod 에서 주입 필요 (env_file 경유):
      #   OAUTH_CLIENT_ID=<STEP 5 완료 후 admin에서 발급된 Client ID>
      #   OAUTH_CLIENT_SECRET=<STEP 5 완료 후 admin에서 발급된 Client Secret>
      #   WEBUI_SECRET_KEY=<python -c "import secrets; print(secrets.token_hex(32))">
    # 외부 포트 미노출 — Nginx 내부 통신만 허용
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: django_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/maintenance/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - ./ops/certs:/etc/nginx/certs:ro
      - staticfiles:/usr/share/nginx/html/static:ro
      - media_data:/app/media
    mem_limit: 128m
    cpus: "0.5"
    restart: unless-stopped

volumes:
  pgdata:
  media_data:
  staticfiles:
  open-webui: