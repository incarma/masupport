<!-- django_ma/templates/landing/index.html -->

{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인카금융서비스 — 인생설계 카운슬러</title>

  <!-- Google Fonts: Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Landing CSS -->
  <link rel="stylesheet" href="{% static 'css/apps/index.css' %}">
</head>
<body>

  <!-- =============================================
       Fixed Navigation Bar
       ============================================= -->
  <nav class="landing-nav" id="landingNav" role="navigation" aria-label="주 내비게이션">
    <a href="#" class="nav-logo" aria-label="인카금융서비스 홈">
      <img
        class="nav-logo-img"
        src="{% static 'landing/logos/ci-logo.png' %}"
        alt="인카금융서비스 로고"
        width="38"
        height="38"
      >
      <div class="nav-logo-text">
        인카금융서비스
        <small>KOSDAQ 상장법인</small>
      </div>
    </a>

    <button
      class="btn-login"
      id="btnOpenLogin"
      type="button"
      aria-haspopup="dialog"
      aria-expanded="false"
      aria-controls="loginModal"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      로그인
    </button>
  </nav>

  <!-- =============================================
       Section 0: Hero
       ============================================= -->
  <section
    class="landing-hero"
    id="section-0"
    data-section="0"
    aria-label="인카금융서비스 인생설계 카운슬러"
    style="--hero-bg-image: url('{% static 'landing/bg/s0-hero-bg.png' %}');"
  >
    <!-- Layer 1: Background -->
    <div class="hero-bg" role="img" aria-label="밝은 회의실 배경" aria-hidden="true"></div>

    <!-- Layer 2: Object -->
    <div class="section-objects" aria-hidden="true">
      <img
        class="obj obj-title-counselor"
        id="objTitleCounselor"
        src="{% static 'landing/objects/s0/title-counselor.png' %}"
        alt=""
        data-anim="slideInUp"
        data-delay="0.3"
      >
    </div>

    <!-- Layer 3: Content -->
    <div class="section-content">
      <h1 class="sr-only">인생설계 카운슬러 — 인카금융서비스</h1>
      <p class="hero-tagline" id="heroTagline">당신의 인생을 함께 설계합니다</p>
    </div>

    <!-- Scroll-down 화살표 -->
    <a
      class="scroll-down-arrow"
      id="scrollDownArrow"
      href="#section-1"
      aria-label="다음 섹션으로 이동"
      tabindex="0"
    >
      <span class="arrow-label">Scroll</span>
      <div class="arrow-circle">
        <svg
          class="arrow-chevron"
          width="18"
          height="11"
          viewBox="0 0 18 11"
          fill="none"
          stroke="var(--inka-blue)"
          stroke-width="2.3"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="1 1 9 9.5 17 1"></polyline>
        </svg>
      </div>
    </a>
  </section>

  <!-- =============================================
       Section 1: Since 1999. 인카가 걸어온 길
       ============================================= -->
  <section
    class="section-since1999"
    id="section-1"
    data-section="1"
    aria-label="Since 1999. 인카가 걸어온 길"
    style="--section-bg-image: url('{% static 'landing/bg/s1-history-bg.png' %}');"
  >
    <!-- 타이틀 -->
    <img
      class="s1-title-img"
      id="s1TitleImg"
      src="{% static 'landing/objects/s1/title-history.png' %}"
      alt="Since 1999. 인카가 걸어온 길"
      data-anim="slideInUp"
      data-delay="0.1"
    >

    <!-- 카드 2개 -->
    <div class="s1-cards" id="s1Cards">
      <div class="s1-card">
        <img
          src="{% static 'landing/objects/s1/table-network.png' %}"
          alt="전국적인 영업 네트워크 구축 — 소속 설계사 수 21,592명, 영업지점 수 788지점"
          loading="lazy"
        >
      </div>
      <div class="s1-card">
        <img
          src="{% static 'landing/objects/s1/table-revenue.png' %}"
          alt="꾸준히 성장하는 매출규모 — 2020~2025 연도별 매출 현황"
          loading="lazy"
        >
      </div>
    </div>

    <!-- 연혁 타임라인 -->
    <img
      class="s1-timeline-img"
      id="s1TimelineImg"
      src="{% static 'landing/objects/s1/timeline.png' %}"
      alt="인카금융서비스 연혁 — 1999년 설립부터 2025년 매출 1조 달성까지"
      loading="lazy"
    >
  </section>

  <!-- =============================================
       Section 2: GA 최초 코스닥 상장
       ============================================= -->
  <section
    class="section-kosdaq"
    id="section-2"
    data-section="2"
    data-theme="light"
    aria-label="GA 최초 코스닥 상장, 보험업계 최초 설계사 주식 배분"
    style="--section-bg-image: url('{% static 'landing/bg/s2-kosdaq-bg.png' %}');"
  >
    <!-- 좌측 콘텐츠 래퍼 -->
    <div class="s2-content-wrap">
      <!-- 타이틀 -->
      <img
        class="s2-title-img"
        id="s2TitleImg"
        src="{% static 'landing/objects/s2/title-kosdaq.png' %}"
        alt="GA 최초 코스닥 상장, 보험업계 최초 설계사 주식 배분"
        data-anim="slideInUp"
        data-delay="0.1"
      >

      <!-- 콘텐츠 -->
      <img
        class="s2-contents-img"
        id="s2ContentsImg"
        src="{% static 'landing/objects/s2/contents-kosdaq.png' %}"
        alt="1. 투명한 경영, 신뢰의 기반 / 2. 지속 성장, 매년 실적 갱신 / 3. 체계적 운영의 기업형 GA"
        loading="lazy"
      >
    </div>

    <!-- Scroll-down 화살표 -->
    <a
      class="scroll-down-arrow"
      id="scrollDownArrow2"
      href="#section-2"
      aria-label="다음 섹션으로 이동"
      tabindex="0"
    >
      <span class="arrow-label">Scroll</span>
      <div class="arrow-circle">
        <svg
          class="arrow-chevron"
          width="18"
          height="11"
          viewBox="0 0 18 11"
          fill="none"
          stroke="var(--inka-blue)"
          stroke-width="2.3"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="1 1 9 9.5 17 1"></polyline>
        </svg>
      </div>
    </a>
  </section>

  <!-- Modal Backdrop -->
  <div
    class="modal-backdrop"
    id="modalBackdrop"
    role="presentation"
    aria-hidden="true"
  ></div>

  <!-- =============================================
       Login Modal
       ============================================= -->
  <div
    class="login-modal"
    id="loginModal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
    aria-describedby="modalSubtitle"
  >
    <div class="modal-drag-handle" aria-hidden="true"></div>

    <div class="modal-header">
      <div class="modal-header-logo">
        <img
          class="modal-logo-img"
          src="{% static 'landing/logos/ci-logo.png' %}"
          alt="인카금융서비스 로고"
          width="32"
          height="32"
        >
        <span class="modal-logo-text">인카금융서비스</span>
      </div>

      <h2 class="modal-title" id="modalTitle">로그인</h2>
      <p class="modal-subtitle" id="modalSubtitle">임직원 전용 시스템에 접속합니다</p>

      <button
        class="btn-modal-close"
        id="btnCloseLogin"
        type="button"
        aria-label="로그인 창 닫기"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- AJAX 로그인 폼 -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="inputEmpId">사번</label>
          <input
            class="form-input"
            type="text"
            id="inputEmpId"
            name="username"
            placeholder="사번을 입력하세요"
            autocomplete="username"
            inputmode="numeric"
            maxlength="20"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="inputPassword">비밀번호</label>
          <input
            class="form-input"
            type="password"
            id="inputPassword"
            name="password"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
            required
          >
        </div>

        <!-- 에러 메시지 -->
        <div class="form-error" id="loginError" role="alert" aria-live="polite"></div>

        <button class="btn-submit" type="submit" id="btnSubmitLogin">로그인</button>
      </form>

      <p class="modal-footer-note">
        임직원 전용 시스템입니다.<br>
        계정 문의는 관리자에게 연락해 주세요.
      </p>
    </div>
  </div>

  <!-- Landing JS -->
  <script src="{% static 'js/landing/index.js' %}" defer></script>
</body>
</html>
