<!-- django_ma/templates/registration/password_change_done.html -->

{% extends "base.html" %}
{% load static %}

{% block title %}비밀번호 변경 완료{% endblock %}

{% block content %}
<!-- =============================================================================
  Password Change Done (FINAL)
  - 목적: 비밀번호 변경 성공 안내
  - Django: PasswordChangeDoneView 사용
================================================================================== -->

<div class="container my-5 auth-done-wrap">
  <div class="card shadow-sm auth-done-card">
    <div class="card-body p-4 p-md-5 text-center">

      <!-- Success icon (Bootstrap only, no extra dependency) -->
      <div class="mb-3 auth-done-icon" aria-hidden="true">
        ✅
      </div>

      <h2 class="h4 mb-2 auth-done-title">비밀번호가 변경되었습니다</h2>
      <div class="text-muted mb-4 auth-done-desc">
        이제 새 비밀번호로 안전하게 이용하실 수 있습니다.
      </div>

      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="{% url 'home' %}" class="btn btn-primary">
          홈으로 이동
        </a>
      </div>

      <!-- 운영 안내 -->
      <div class="mt-4 text-muted auth-done-help">
        <!-- 필요 시 추가 안내 문구를 확장할 수 있도록 영역 유지 -->
        비밀번호를 분실하신 경우 관리자에게 문의해 주세요.
      </div>

    </div>
  </div>
</div>
{% endblock %}
