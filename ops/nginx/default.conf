# ───────────────────────────────────────────
# 1. 기본 차단 (알 수 없는 호스트)
# ───────────────────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
    location / { return 444; }
}

# ───────────────────────────────────────────
# 2. ma-support.kr
# Cloudflare Full 모드: 80(HTTP)으로 들어오므로 리다이렉트 없이 바로 프록시
# ───────────────────────────────────────────
server {
    listen 80;
    server_name ma-support.kr;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              ma-support.kr;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_redirect     off;
    }
}

# ───────────────────────────────────────────
# 3. ai.ma-support.kr
# Cloudflare Full 모드: 80(HTTP)으로 들어오므로 리다이렉트 없이 바로 프록시
# ───────────────────────────────────────────
server {
    listen 80;
    server_name ai.ma-support.kr;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass         http://open-webui:8080;
        proxy_http_version 1.1;

        # WebSocket 지원 (Open WebUI 실시간 스트리밍 필수)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering    off;
        proxy_cache        off;
    }
}