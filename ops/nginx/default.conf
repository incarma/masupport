# ── Cloudflare Real IP 복원 ──────────────────────────────────────────
# nginx:alpine 기본 빌드에 ngx_http_realip_module 포함됨
# Cloudflare 공식 IPv4 (https://www.cloudflare.com/ips-v4)
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header    CF-Connecting-IP;
real_ip_recursive on;

# ── Rate Limit Zone 정의 ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=rl_login:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=rl_upload:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=rl_api:10m     rate=120r/m;
limit_req_zone $binary_remote_addr zone=rl_general:10m rate=60r/m;

server {
    listen 80 default_server;
    server_name _;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 444;
    }
}

server {
    listen 80;
    server_name ma-support.kr;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 444;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ma-support.kr;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_tokens off;

    root /usr/share/nginx/html;
    client_max_body_size 50m;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /media/ {
        access_log off;
        return 403;
    }

    location ^~ /static/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 로그인 — brute force 방어
    location = /login/ {
        limit_req zone=rl_login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host ma-support.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    # 파일 업로드
    location ~* ^/(commission|accounts)/.*upload.*$ {
        limit_req zone=rl_upload burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host ma-support.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }

    # AJAX/API
    location ~* ^/(board|commission|dash|manual|partner)/.*$ {
        limit_req zone=rl_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host ma-support.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_intercept_errors on;
        error_page 502 503 504 = /maintenance.html;
    }

    # 일반 (기존 / 블록 대체)
    location / {
        limit_req zone=rl_general burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host ma-support.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_intercept_errors on;
        error_page 502 503 504 = /maintenance.html;
    }

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
        add_header Cache-Control "no-store";
    }
}
